<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不分手约定</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f9f7fe 0%, #e6f3ff 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #ff7eb3, #65c7f7, #9dffb0);
            z-index: 1;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.3rem;
            font-weight: 300;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .signatures-section {
            margin-bottom: 50px;
        }
        
        .section-title {
            font-size: 1.8rem;
            color: #3498db;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            margin-right: 12px;
            font-size: 1.6rem;
        }
        
        .signatures-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        
        .signature-card {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        
        .signature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .signature-img-container {
            height: 280px;
            overflow: hidden;
            position: relative;
        }
        
        .signature-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .signature-card:hover .signature-img {
            transform: scale(1.05);
        }
        
        .signature-label {
            padding: 20px;
            text-align: center;
            background-color: #f8f9fa;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .audio-section {
            margin-top: 60px;
        }
        
        .audio-player-container {
            max-width: 700px;
            margin: 30px auto;
            background: linear-gradient(145deg, #ffffff, #f0f7ff);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.15);
            position: relative;
            overflow: hidden;
        }
        
        .audio-player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(to bottom, #ff7eb3, #65c7f7);
        }
        
        .audio-title {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        
        .audio-title i {
            font-size: 2rem;
            color: #3498db;
            margin-right: 15px;
        }
        
        .audio-title h3 {
            font-size: 1.8rem;
        }
        
        .audio-info {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.7;
        }
        
        audio {
            width: 100%;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        audio::-webkit-media-controls-panel {
            background-color: #f8f9fa;
            border-radius: 50px;
        }
        
        .heart-container {
            text-align: center;
            margin-top: 30px;
            font-size: 2.5rem;
            color: #ff7eb3;
            animation: heartbeat 1.5s infinite;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            5% { transform: scale(1.2); }
            10% { transform: scale(1.1); }
            15% { transform: scale(1.3); }
            20% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        footer {
            margin-top: 50px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .signatures-container {
                flex-direction: column;
                align-items: center;
            }
            
            .signature-card {
                max-width: 100%;
            }
            
            .audio-player-container {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .signature-img-container {
                height: 220px;
            }
        }
    a:link {
	color: #000000;
	text-decoration: none;
}
a:visited {
	text-decoration: none;
}
a:hover {
	text-decoration: underline;
}
a:active {
	text-decoration: none;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>不分手的约定</h1>
            <p class="subtitle">珍贵的签名记录与永恒的不分手誓言，见证美好的承诺与情谊</p>
        </header>
        
        <section class="signatures-section">
            <h2 class="section-title"><i class="fas fa-signature"></i> 签名展示</h2>
            <div class="signatures-container">
                <div class="signature-card">
                    <div class="signature-img-container">
                        <!-- 假设图片在images文件夹下 -->
                        <img src="images/1.jpg" alt="家方签名 1" class="signature-img" id="signature1">
                    </div>
                    <div class="signature-label">签名 #1</div>
                </div>
                
                <div class="signature-card">
                    <div class="signature-img-container">
                        <!-- 假设图片在images文件夹下 -->
                        <img src="images/2.jpg" alt="家方签名 2" class="signature-img" id="signature2">
                    </div>
                    <div class="signature-label">签名 #2</div>
                </div>
            </div>
        </section>
        
        <section class="audio-section">
            <h2 class="section-title"><i class="fas fa-music"></i> 誓言音频</h2>
            <div class="audio-player-container">
                <div class="audio-title">
                    <i class="fas fa-heart"></i>
                  <a href="other/1.pdf"><h3>不分手誓言</h3></a> 
                </div>
                <p class="audio-info">
                    这段珍贵的录音承载着永恒的承诺与真挚的情感。点击播放按钮，聆听这份坚定的不分手誓言，感受其中蕴含的深情与决心。
                </p>
                
                <!-- 假设音频在other文件夹下 -->
                <audio controls>
                    <source src="other/1.MP3" type="audio/mpeg">
                    您的浏览器不支持音频播放功能，请尝试使用现代浏览器如Chrome、Firefox或Edge。
                </audio>
                
                <div class="heart-container">
                    <i class="fas fa-heart"></i>
                </div>
            </div>
        </section>
        
        <footer>
            <p>© 2026 不分手条约| 设计：用心呈现每一份珍贵记忆</p>
            <p>本页面展示的签名图片与音频均为珍贵个人收藏</p>
        </footer>
    </div>

    <script>
        // 图片加载失败时的处理
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.signature-img');
            
            images.forEach(img => {
                img.addEventListener('error', function() {
                    this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280"><rect width="400" height="280" fill="%23f0f0f0"/><text x="200" y="140" font-family="Arial" font-size="18" text-anchor="middle" fill="%23999">图片加载中</text></svg>';
                    this.alt = '图片加载失败，请检查文件路径';
                });
            });
            
            // 音频加载失败处理
            const audio = document.querySelector('audio');
            audio.addEventListener('error', function() {
                const container = this.parentElement;
                const errorMsg = document.createElement('p');
                errorMsg.innerHTML = '<strong>音频加载失败：</strong>请检查音频文件路径是否正确 (other/1.MP3)';
                errorMsg.style.color = '#e74c3c';
                errorMsg.style.marginTop = '15px';
                errorMsg.style.padding = '10px';
                errorMsg.style.backgroundColor = '#fff5f5';
                errorMsg.style.borderRadius = '5px';
                container.appendChild(errorMsg);
            });
            
            // 添加简单的交互效果
            const cards = document.querySelectorAll('.signature-card');
            cards.forEach(card => {
                card.addEventListener('click', function() {
                    this.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                });
            });
        });
    </script>
</body>
</html>
