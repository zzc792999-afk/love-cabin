<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ 恋爱漂流纸飞机 - 时光小屋</title>
    
    <!-- 谷歌字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff7597;
            --primary-dark: #e65275;
            --primary-light: #ffb6c1;
            --secondary: #a17fe0;
            --secondary-light: #c2aef2;
            
            --sky-bg: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
        }

        [data-theme="dark"] {
            --primary: #a17fe0;
            --primary-dark: #885fd1;
            --primary-light: #c2aef2;
            --secondary: #ff7597;
            
            --sky-bg: linear-gradient(to bottom, #110f22 0%, #201e38 100%);
            --card-bg: rgba(30, 24, 46, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-color: #ecf0f1;
            --text-muted: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--sky-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            transition: background 0.8s ease;
        }

        /* 3D 浮动白云背景 */
        .cloud-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            filter: blur(8px);
            animation: floatCloud linear infinite;
        }

        [data-theme="dark"] .cloud {
            background: rgba(255, 255, 255, 0.05);
            filter: blur(12px);
        }

        @keyframes floatCloud {
            0% { transform: translateX(110vw); }
            100% { transform: translateX(-40vw); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            height: 90vh;
        }

        /* 顶部导航 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* ✈️ 漂流飞机主天空舞台 */
        .sky-stage {
            flex: 1;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border: var(--border-glass);
            border-radius: 32px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .stage-title {
            text-align: center;
            z-index: 5;
        }

        .stage-title h2 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stage-title p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* 🚀 3D 折纸飞机 */
        .airplane {
            position: absolute;
            width: 70px;
            height: 50px;
            cursor: pointer;
            z-index: 20;
            transform-style: preserve-3d;
            animation: planeWiggle 3s infinite ease-in-out;
            transition: transform 0.3s;
        }

        /* 纸飞机的 3D 折纸效果 (SVG路径拼合而成) */
        .airplane-inner {
            width: 100%;
            height: 100%;
            transform: rotateY(0deg);
            transform-style: preserve-3d;
        }

        .airplane svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
        }

        .airplane svg path {
            fill: #ffffff;
            stroke: rgba(0,0,0,0.05);
            stroke-width: 1px;
            transition: fill 0.3s;
        }

        [data-theme="dark"] .airplane svg path {
            fill: #d2cbe2;
        }

        /* 纸飞机摇晃飞行轨迹动画 */
        @keyframes planeWiggle {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-12px) rotate(-5deg); }
        }

        /* 飞行航线 */
        @keyframes flyAcross {
            0% { left: -100px; top: 40%; }
            100% { left: 110%; top: 30%; }
        }

        /* 写飞机操作按钮 */
        .btn-write-plane {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 117, 151, 0.25);
            align-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .btn-write-plane:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 117, 151, 0.4);
        }

        /* 📝 折信展开展便签卡 */
        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 18, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .letter-paper {
            width: 100%;
            max-width: 380px;
            background: #fffdf5; /* 经典信纸色 */
            border-radius: 20px;
            box-shadow: 0 25px 65px rgba(0,0,0,0.35);
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            position: relative;
            transform: scale(0.3) rotate(-10deg);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .letter-paper.show {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        .letter-inner {
            border: 2px dashed rgba(255, 117, 151, 0.25);
            border-radius: 14px;
            margin: 10px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 250px;
            justify-content: space-between;
        }

        .letter-title {
            font-size: 0.75rem;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            border-bottom: 1px dashed rgba(0,0,0,0.05);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .letter-text {
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 1.15rem;
            line-height: 1.7;
            color: #2c3e50;
            word-wrap: break-word;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .letter-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            border-top: 1px dashed rgba(0,0,0,0.05);
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
        }

        /* 写飞机表单 */
        .write-paper {
            background: white;
        }

        .write-textarea {
            width: 100%;
            height: 120px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 12px;
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 1.05rem;
            resize: none;
            outline: none;
            color: #2c3e50;
            background: #fafaf8;
        }

        .write-textarea:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-send-plane {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: 800;
            cursor: pointer;
            align-self: center;
            box-shadow: 0 4px 15px rgba(255, 117, 151, 0.25);
            transition: all 0.3s;
        }

        .btn-send-plane:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255, 117, 151, 0.4);
        }

        .btn-close-overlay {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-close-overlay:hover {
            background: white;
            color: #121012;
        }
    </style>
</head>
<body>

    <!-- ☁️ 浮云背景 -->
    <div class="cloud-wrapper" id="cloud-container"></div>

    <div class="container">
        <!-- 头部栏 -->
        <header>
            <a href="../index.html" class="btn-back"><i class="fas fa-home"></i> 时光小屋</a>
            <button id="theme-btn" class="btn-back" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center;" title="切换主题"><i class="fas fa-moon"></i></button>
        </header>

        <!-- ✈️ 天空舞台 -->
        <div class="sky-stage">
            <div class="stage-title">
                <h2>✈️ 恋爱漂流纸飞机</h2>
                <p>点击空中飞行的纸飞机拆开密令，或放飞一架寄托爱意的飞机</p>
            </div>

            <!-- 动态漂浮的飞机容器 -->
            <div id="sky-element" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: auto;">
                <!-- JS动态插入飞行的飞机 -->
            </div>

            <!-- 操作按钮 -->
            <button class="btn-write-plane" id="btn-open-writer">
                <i class="fas fa-paper-plane"></i> 放飞新的纸飞机
            </button>
        </div>
    </div>

    <!-- 💌 查看飞机密纸遮罩层 -->
    <div class="letter-overlay" id="letter-overlay">
        <div class="open-container" style="display: flex; flex-direction: column; align-items: center;">
            <div class="letter-paper" id="letter-card">
                <div class="letter-inner">
                    <div class="letter-title">
                        <span>✈️ 纸飞机密信</span>
                        <span id="letter-date-val">2026-07-13</span>
                    </div>
                    <div class="letter-text" id="letter-content-val">
                        今天的风很温柔，像我想你时的吻。😚
                    </div>
                    <div class="letter-footer">
                        <span>来自：哲哲</span>
                        <span>🔒 珊珊的专属浪漫</span>
                    </div>
                </div>
            </div>
            <button class="btn-close-overlay" id="btn-close-letter">收入行囊</button>
        </div>
    </div>

    <!-- 📝 写新纸飞机遮罩层 -->
    <div class="letter-overlay" id="write-overlay">
        <div class="open-container" style="display: flex; flex-direction: column; align-items: center;">
            <div class="letter-paper write-paper" id="write-card" style="background: #fffdf5;">
                <div class="letter-inner" style="border-color: rgba(161, 127, 224, 0.3);">
                    <div class="letter-title" style="color: var(--secondary);">
                        <span>📝 写下纸飞机密信</span>
                        <span>投递至风中</span>
                    </div>
                    <textarea class="write-textarea" id="write-textarea-val" placeholder="珊珊可以在这里写下想对哲哲说的话，折成飞机放飞后，哲哲会在留言历史回廊中收到哦..."></textarea>
                    <button class="btn-send-plane" id="btn-send-airplane">折叠并放飞飞机 ✈️</button>
                </div>
            </div>
            <button class="btn-close-overlay" id="btn-close-writer">取消投递</button>
        </div>
    </div>

    <script>
        // 🛡️ 安全本地存储
        function safeGet(key, defaultVal = '') {
            try {
                return localStorage.getItem(key) || defaultVal;
            } catch (e) {
                try {
                    return sessionStorage.getItem(key) || defaultVal;
                } catch (err) {
                    return window[`__safe_storage_${key}`] || defaultVal;
                }
            }
        }

        function safeSet(key, val) {
            try {
                localStorage.setItem(key, val);
            } catch (e) {
                try {
                    sessionStorage.setItem(key, val);
                } catch (err) {
                    window[`__safe_storage_${key}`] = val;
                }
            }
        }

        // 🌗 主题自动匹配
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = safeGet('theme', 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            safeSet('theme', currentTheme);
            updateThemeIcon();
        });

        function updateThemeIcon() {
            themeBtn.innerHTML = currentTheme === 'light' 
                ? '<i class="fas fa-moon"></i>' 
                : '<i class="fas fa-sun"></i>';
        }

        // 🔊 Web Audio API 音效合成器
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
        }

        // 飞走呼啸声
        function playSwooshSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                gain.gain.setValueAtTime(0.01, now);
                gain.gain.linearRampToValueAtTime(0.1, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } catch(e) {}
        }

        // 纸张展开声
        function playUnfoldSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(450, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } catch(e) {}
        }

        // ☁️ 自动渲染云朵
        const cloudContainer = document.getElementById('cloud-container');
        function spawnClouds() {
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                
                const w = Math.random() * 120 + 80;
                const h = w * 0.4;
                cloud.style.width = w + 'px';
                cloud.style.height = h + 'px';
                
                cloud.style.top = Math.random() * 60 + 10 + '%';
                cloud.style.left = Math.random() * 100 + '%';
                
                const duration = Math.random() * 40 + 30;
                cloud.style.animationDuration = duration + 's';
                cloud.style.animationDelay = -Math.random() * duration + 's';
                
                cloudContainer.appendChild(cloud);
            }
        }
        spawnClouds();

        // 💌 哲哲预设的漂流飞机纸条
        const PRESET_MESSAGES = [
            "今天的风很温柔，像我想你时的亲亲。💋",
            "不管在哪里，我的纸飞机都会带着爱飞向你身边。✈️",
            "今天也要好好吃饭，按时睡觉，哲哲在梦里抱你！🫂",
            "世界上最幸福的事，就是再次牵起珊珊的手。🤝",
            "珊珊是全世界最可爱最让人想要呵护的女孩子！🌸",
            "每一架纸飞机都装载着我对你 200% 的喜欢。💖",
            "想把天上的云彩摘下来，做成棉花糖送给你吃。☁️",
            "余生漫漫，哲哲只想做珊珊一个人的避风港。⚓"
        ];

        // ✈️ 动态渲染天空中的纸飞机
        const sky = document.getElementById('sky-element');
        let flightInterval = null;

        function createFlightPlane() {
            const plane = document.createElement('div');
            plane.className = 'airplane';
            
            // 设定 SVG 3D 折纸样式
            plane.innerHTML = `
                <div class="airplane-inner">
                    <svg viewBox="0 0 100 80">
                        <!-- 纸飞机的折角阴影效果 -->
                        <path d="M10,40 L90,10 L70,55 Z" style="fill-opacity: 0.95;" />
                        <path d="M10,40 L70,55 L45,70 Z" style="fill-opacity: 0.75;" />
                        <path d="M70,55 L45,70 L90,10 Z" style="fill-opacity: 0.85;" />
                    </svg>
                </div>
            `;
            
            const startY = Math.random() * 50 + 20; // 屏幕高度占比
            const endY = Math.random() * 50 + 20;
            const duration = Math.random() * 8 + 8; // 8-16秒
            const delay = -Math.random() * 5;
            
            plane.style.top = startY + '%';
            plane.style.left = '-80px';
            plane.style.transform = `scale(${Math.random() * 0.4 + 0.8})`;
            
            // 绑定独特的飞行动画
            plane.style.animation = 'planeWiggle 2s infinite ease-in-out';
            
            // 渐次飞过屏幕
            let startTime = Date.now();
            let flyTimer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const pct = elapsed / (duration * 1000);
                
                if (pct >= 1) {
                    clearInterval(flyTimer);
                    plane.remove();
                } else {
                    const x = pct * 120 - 10;
                    const y = startY + (endY - startY) * pct;
                    plane.style.left = x + '%';
                    plane.style.top = y + '%';
                }
            }, 30);
            
            // 点击飞机展开
            plane.addEventListener('click', (e) => {
                e.stopPropagation();
                clearInterval(flyTimer);
                openPlaneLetter(plane);
            });
            
            sky.appendChild(plane);
        }

        // 定时定量渲染飞机
        function startSkySimulation() {
            createFlightPlane();
            createFlightPlane();
            flightInterval = setInterval(() => {
                if (document.querySelectorAll('.airplane').length < 4) {
                    createFlightPlane();
                }
            }, 4000);
        }
        startSkySimulation();

        // 展开密纸
        const letterOverlay = document.getElementById('letter-overlay');
        const letterCard = document.getElementById('letter-card');
        const letterContent = document.getElementById('letter-content-val');
        const letterDate = document.getElementById('letter-date-val');
        const btnCloseLetter = document.getElementById('btn-close-letter');

        function openPlaneLetter(planeEl) {
            initAudio();
            playUnfoldSound();
            
            // 放大淡出飞机
            planeEl.style.transform = 'scale(2) rotate(15deg)';
            planeEl.style.opacity = '0';
            
            setTimeout(() => {
                planeEl.remove();
                
                // 填充信息
                const randomMsg = PRESET_MESSAGES[Math.floor(Math.random() * PRESET_MESSAGES.length)];
                letterContent.textContent = randomMsg;
                letterDate.textContent = new Date().toISOString().split('T')[0];
                
                letterOverlay.style.display = 'flex';
                setTimeout(() => {
                    letterCard.classList.add('show');
                }, 50);
            }, 300);
        }

        btnCloseLetter.addEventListener('click', () => {
            letterCard.classList.remove('show');
            setTimeout(() => {
                letterOverlay.style.display = 'none';
            }, 450);
        });

        // 📝 写飞机板块
        const btnOpenWriter = document.getElementById('btn-open-writer');
        const writeOverlay = document.getElementById('write-overlay');
        const writeCard = document.getElementById('write-card');
        const btnCloseWriter = document.getElementById('btn-close-writer');
        const btnSendAirplane = document.getElementById('btn-send-airplane');
        const writeTextarea = document.getElementById('write-textarea-val');

        btnOpenWriter.addEventListener('click', () => {
            initAudio();
            writeTextarea.value = '';
            writeOverlay.style.display = 'flex';
            setTimeout(() => {
                writeCard.classList.add('show');
                writeTextarea.focus();
            }, 50);
        });

        btnCloseWriter.addEventListener('click', () => {
            writeCard.classList.remove('show');
            setTimeout(() => {
                writeOverlay.style.display = 'none';
            }, 450);
        });

        // 折叠并放飞飞机到云端（联动云端服务器保存）
        btnSendAirplane.addEventListener('click', () => {
            const content = writeTextarea.value.trim();
            if (!content) {
                alert('请写点心里话再放飞哦！');
                return;
            }

            btnSendAirplane.disabled = true;
            btnSendAirplane.textContent = '正在折叠纸飞机... 📐';
            
            // 1. 本地存储降级备份
            let offlinePlanes = [];
            try {
                const stored = safeGet('gashapon_offline_planes');
                offlinePlanes = stored ? JSON.parse(stored) : [];
            } catch(e) {}
            
            const newPlaneObj = {
                signature: '纸飞机',
                text: content,
                date: new Date().toLocaleString()
            };
            offlinePlanes.push(newPlaneObj);
            safeSet('gashapon_offline_planes', JSON.stringify(offlinePlanes));

            // 2. 尝试向后端 server 发送请求（如果是部署环境）
            fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: `✈️ 【时光纸飞机】：${content}`,
                    sign: '纸飞机'
                })
            }).then(res => res.json())
              .then(data => {
                  console.log('Airplane synced to cloud messages database!');
                  animateOutgoingPlane();
              })
              .catch(err => {
                  console.log('Offline mode active. Airplane saved to local cache.');
                  animateOutgoingPlane();
              });
        });

        function animateOutgoingPlane() {
            playSwooshSound();
            writeCard.classList.remove('show');
            
            // 生成一架飞机从正中央呼啸飞走
            const outgoing = document.createElement('div');
            outgoing.className = 'airplane';
            outgoing.style.left = '50%';
            outgoing.style.top = '50%';
            outgoing.style.transform = 'translate(-50%, -50%) scale(1.5) rotate(15deg)';
            outgoing.style.zIndex = '99999';
            outgoing.innerHTML = `
                <div class="airplane-inner">
                    <svg viewBox="0 0 100 80">
                        <path d="M10,40 L90,10 L70,55 Z" style="fill: #ffd700;" />
                        <path d="M10,40 L70,55 L45,70 Z" style="fill: #f1c40f;" />
                        <path d="M70,55 L45,70 L90,10 Z" style="fill: #e67e22;" />
                    </svg>
                </div>
            `;
            document.body.appendChild(outgoing);
            
            setTimeout(() => {
                outgoing.style.transition = 'all 1.2s cubic-bezier(0.25, 1, 0.5, 1)';
                outgoing.style.left = '120%';
                outgoing.style.top = '10%';
                outgoing.style.transform = 'scale(0.1) rotate(45deg)';
                outgoing.style.opacity = '0';
            }, 50);

            setTimeout(() => {
                outgoing.remove();
                btnSendAirplane.disabled = false;
                btnSendAirplane.textContent = '折叠并放飞飞机 ✈️';
                writeOverlay.style.display = 'none';
                alert('🚀 您的折纸飞机已伴随微风呼啸飞走，保存到了时光留言板！');
            }, 1300);
        }
    </script>
</body>
