<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📖 恋爱答案之书 - 时光小屋</title>
    
    <!-- 谷歌字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff7597;
            --primary-dark: #e65275;
            --primary-light: #ffb6c1;
            --secondary: #a17fe0;
            --secondary-light: #c2aef2;
            
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
        }

        [data-theme="dark"] {
            --primary: #a17fe0;
            --primary-dark: #885fd1;
            --primary-light: #c2aef2;
            --secondary: #ff7597;
            
            --bg-grad: linear-gradient(135deg, #1e1b29 0%, #0f0d1a 100%);
            --card-bg: rgba(30, 24, 46, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-color: #ecf0f1;
            --text-muted: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-grad);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        /* 背景 Canvas 繁星效果 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        /* 顶部导航 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* 3D 书本展示板 */
        .book-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            min-height: 380px;
            position: relative;
        }

        /* 3D 书本容器 */
        .book {
            width: 250px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.15, 1, 0.3, 1);
            cursor: pointer;
        }

        /* 书的侧边厚度 */
        .book::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            width: 18px;
            height: 346px;
            background: #ab3e5b;
            transform: rotateY(-90deg) translateZ(9px);
            border-radius: 3px 0 0 3px;
        }

        /* 书本打开后的 3D 控制 */
        .book.open {
            transform: rotateY(-180deg) translateX(125px);
        }

        /* 书页基类 */
        .book-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 0 16px 16px 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.15, 1, 0.3, 1), opacity 0.3s;
            box-shadow: 4px 6px 15px rgba(0,0,0,0.15);
        }

        /* 封面 */
        .page-cover {
            background: linear-gradient(135deg, #8b1030 0%, #560a1e 100%);
            border: 3px solid rgba(255, 215, 0, 0.4);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .cover-content {
            border: 2px dashed rgba(255, 215, 0, 0.25);
            border-radius: 12px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .cover-icon {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 20px;
            animation: pulseHeart 2s infinite ease-in-out;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,215,0,0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 12px rgba(255,215,0,0.7)); }
        }

        .cover-title {
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 10px;
        }

        .cover-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
            line-height: 1.5;
            margin-top: 15px;
        }

        /* 内部页 (背页与翻阅页) */
        .page-inside {
            background: #fdfaf2; /* 复古纸张底面 */
            z-index: 5;
            transform: rotateY(180deg); /* 抵消书本旋转，使文字正面朝上 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 5px solid rgba(0,0,0,0.1);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 书内页文字区 */
        .page-content-wrapper {
            border-radius: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* 答案文字 */
        .answer-heading {
            font-size: 0.8rem;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(255, 117, 151, 0.3);
            padding-bottom: 5px;
            width: 100%;
        }

        .answer-text {
            font-family: 'Kaiti', 'STKaiti', 'KaiTi_GB2312', serif;
            font-size: 1.25rem;
            line-height: 1.8;
            color: #2c3e50;
            font-weight: 700;
            letter-spacing: 1px;
            word-break: break-all;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .answer-text.show {
            opacity: 1;
        }

        /* 翻页时的动态层 */
        .page-flip-sheet {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f9f5eb;
            border-radius: 0 16px 16px 0;
            transform-origin: left center;
            z-index: 8;
            box-shadow: 4px 6px 15px rgba(0,0,0,0.15);
            border-left: 5px solid rgba(0,0,0,0.1);
        }

        .page-flip-sheet.flipping {
            animation: sheetFlip 1.5s ease-in-out forwards;
        }

        @keyframes sheetFlip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-180deg); }
        }

        /* 操作区 */
        .action-panel {
            background: var(--card-bg);
            border: var(--border-glass);
            border-radius: 28px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            text-align: center;
        }

        .action-panel h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .action-panel p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 占卜大按钮 */
        .btn-divine {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 117, 151, 0.35);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-divine:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 117, 151, 0.5);
        }

        .btn-divine:active {
            transform: scale(0.98);
        }

        .btn-divine.disabled {
            background: #95a5a6;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 移动端响应式适配 */
        @media (max-width: 600px) {
            .book {
                width: 200px;
                height: 290px;
            }
            .book.open {
                /* 减少 translateX 距离，并追加 scale(0.85) 缩放，避免窄屏手机右侧文字溢出屏幕 */
                transform: rotateY(-180deg) translateX(65px) scale(0.85);
            }
            .book::before {
                height: 286px;
                width: 14px;
                transform: rotateY(-90deg) translateZ(7px);
            }
            .answer-text {
                font-size: 1.05rem;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- 头部栏 -->
        <header>
            <a href="../index.html" class="btn-back"><i class="fas fa-home"></i> 时光小屋</a>
            <button id="theme-btn" class="btn-back" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center;" title="切换主题"><i class="fas fa-moon"></i></button>
        </header>

        <!-- 3D 舞台 -->
        <div class="book-stage">
            <!-- 3D 书本 -->
            <div class="book" id="book-element">
                <!-- 封面 (Front Cover) -->
                <div class="book-page page-cover" id="page-cover">
                    <div class="cover-content">
                        <div class="cover-icon"><i class="fas fa-book-open"></i></div>
                        <h1 class="cover-title">答案之书</h1>
                        <p style="color: #ffd700; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;">THE BOOK OF ANSWERS</p>
                        <p class="cover-desc">—— 默念心中的烦恼或抉择，点击翻开哲哲给你的浪漫解答 ——</p>
                    </div>
                </div>

                <!-- 内页 (Inside Page) -->
                <div class="book-page page-inside" id="page-inside">
                    <div class="page-content-wrapper">
                        <div class="answer-heading">🔮 答案之书定格 🔮</div>
                        <div class="answer-text" id="answer-text-val">不用怀疑，哲哲现在正宇宙第一想你！</div>
                        <p style="font-size: 0.7rem; color: var(--text-muted); position: absolute; bottom: 20px; letter-spacing: 1px;">🐾 书页合上即可重新提问</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 核心交互区 -->
        <div class="action-panel">
            <h2 id="stage-title">🔮 默念问题，开启占卜</h2>
            <p id="stage-desc">闭上眼睛，在心里默念一个选择题（例如：“今晚要亲哲哲一下吗？”），然后点击下方按钮，翻阅魔法之书的神秘指引。</p>
            
            <button class="btn-divine" id="btn-action">
                <i class="fas fa-magic"></i> <span id="btn-text">翻阅答案之书</span>
            </button>
        </div>
    </div>

    <script>
        // 🛡️ 安全本地存储
        function safeGet(key, defaultVal = '') {
            try {
                return localStorage.getItem(key) || defaultVal;
            } catch (e) {
                try {
                    return sessionStorage.getItem(key) || defaultVal;
                } catch (err) {
                    return window[`__safe_storage_${key}`] || defaultVal;
                }
            }
        }

        function safeSet(key, val) {
            try {
                localStorage.setItem(key, val);
            } catch (e) {
                try {
                    sessionStorage.setItem(key, val);
                } catch (err) {
                    window[`__safe_storage_${key}`] = val;
                }
            }
        }

        // 🌗 主题自动匹配
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = safeGet('theme', 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            safeSet('theme', currentTheme);
            updateThemeIcon();
        });

        function updateThemeIcon() {
            themeBtn.innerHTML = currentTheme === 'light' 
                ? '<i class="fas fa-moon"></i>' 
                : '<i class="fas fa-sun"></i>';
        }

        // 🔊 Web Audio API 声音合成引擎
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
        }

        // 纸张沙沙翻动声效
        function playPageFlipSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const now = audioCtx.currentTime;
                // 用白噪音+带通滤波器合成沙沙的声音
                const bufferSize = audioCtx.sampleRate * 1.2; // 1.2秒
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(600, now);
                filter.frequency.exponentialRampToValueAtTime(1500, now + 1.0);
                filter.Q.setValueAtTime(1.5, now);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.01, now);
                gain.gain.linearRampToValueAtTime(0.12, now + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                noise.start(now);
                noise.stop(now + 1.2);
            } catch(e) {}
        }

        function playDingSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.08, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } catch(e) {}
        }

        // 🎫 20条恋爱答案语录
        const ANSWERS = [
            "不用怀疑，哲哲现在正宇宙第一想你！❤️",
            "答案是：立刻给哲哲发一个‘Mua~’，今天会超级好运哦。🐾",
            "不管遇到什么风雨，哲哲都会在你身后抱紧你，直到永远。🫂",
            "今晚适合一起吃一顿大餐，卡路里什么的明天再说啦！🍔",
            "哲哲最爱你的傻笑，去对他笑一个吧，他会立刻投降。🤭",
            "去把扭蛋机转一下，看看里面是不是藏着今天的惊喜！🔮",
            "去伸个懒腰，闭上双眼，哲哲正在心里默默陪着你。✨",
            "答案是：毫无保留地去爱吧，你们是命中注定的一对。👑",
            "今天你可以对他发一次小脾气，哲哲承诺绝对打不还手骂不还口！😤",
            "买一杯茶百道奶茶奖励自己吧，全糖加椰果，哲哲买单！🥤",
            "答案是肯定的，他比昨天更爱你，也比明天更期待见到你。🌸",
            "现在闭上眼睛默数三秒，哲哲正在世界的另一个角落默默想你。🌌",
            "出示你的特权卡去要求他吧，今天你最大！🎟️",
            "去时光小屋留言板给他贴一张小纸条，写下你现在的悄悄话。📜",
            "答案就在你心里，其实你早就知道了——他永远只偏心你一个人。💝",
            "放下所有的顾虑，他比你想象的还要坚决和勇敢。💪",
            "答案是：今天适合赖床/偷懒，哲哲会帮你做好一切准备！🧸",
            "去亲哲哲一下，今天的所有好运气都会双倍奉还！💋",
            "去吃一块甜甜的小蛋糕，让甜度充盈你的整天。🧁",
            "答案是：执子之手，与子偕老。你们会一直一直幸福下去的！💍"
        ];

        // 交互逻辑控制
        const book = document.getElementById('book-element');
        const btnAction = document.getElementById('btn-action');
        const btnText = document.getElementById('btn-text');
        const answerTextVal = document.getElementById('answer-text-val');
        const coverPage = document.getElementById('page-cover');
        const stageTitle = document.getElementById('stage-title');
        const stageDesc = document.getElementById('stage-desc');

        let isBookOpen = false;
        let isAnimating = false;

        btnAction.addEventListener('click', () => {
            initAudio();
            if (isAnimating) return;

            if (!isBookOpen) {
                // 打开书本，进行占卜
                isAnimating = true;
                btnAction.classList.add('disabled');
                
                stageTitle.textContent = '📖 书页翻动中，聆听哲哲的心声...';
                stageDesc.textContent = '魔法之书正在快速梭巡属于你的特权答案，请集中意念...';
                
                // 播放沙沙的翻页声
                playPageFlipSound();
                
                // 动态插入多张快速翻过的半透明纸张，营造极速翻页效果
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const sheet = document.createElement('div');
                        sheet.className = 'page-flip-sheet';
                        sheet.style.transform = `rotateY(-${Math.random() * 20}deg)`;
                        sheet.style.zIndex = 7 + i;
                        // 随机色相的纸张边缘
                        sheet.style.borderRight = '1px solid rgba(0,0,0,0.05)';
                        book.appendChild(sheet);
                        
                        setTimeout(() => {
                            sheet.classList.add('flipping');
                        }, 50);

                        setTimeout(() => {
                            sheet.remove();
                        }, 1450);
                    }, i * 150);
                }

                // 200ms 后，书壳以 3D 打开动画旋转
                setTimeout(() => {
                    book.classList.add('open');
                }, 200);

                // 1.5 秒后翻页停止，展露最终答案
                setTimeout(() => {
                    const randomIdx = Math.floor(Math.random() * ANSWERS.length);
                    answerTextVal.textContent = ANSWERS[randomIdx];
                    answerTextVal.classList.add('show');
                    
                    playDingSound();
                    
                    stageTitle.textContent = '✨ 答案已定格！';
                    stageDesc.textContent = '这是魔法之书给出的神秘指引，书本合上后可以重新提问哦~';
                    
                    btnText.textContent = '合上魔法书';
                    btnAction.classList.remove('disabled');
                    isBookOpen = true;
                    isAnimating = false;
                }, 1600);

            } else {
                // 合上书本，重置状态
                isAnimating = true;
                btnAction.classList.add('disabled');
                answerTextVal.classList.remove('show');
                
                book.classList.remove('open');
                playPageFlipSound();

                setTimeout(() => {
                    stageTitle.textContent = '🔮 默念问题，开启占卜';
                    stageDesc.textContent = '闭上眼睛，在心里默念一个选择题（例如：“今晚要亲哲哲一下吗？”），然后点击下方按钮，翻阅魔法之书的神秘指引。';
                    
                    btnText.textContent = '翻阅答案之书';
                    btnAction.classList.remove('disabled');
                    isBookOpen = false;
                    isAnimating = false;
                }, 1200);
            }
        });

        // 点击书本封面也可以触发打开
        coverPage.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isBookOpen && !isAnimating) {
                btnAction.click();
            }
        });

        // 🌌 繁星粒子背景 Canvas
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width = bgCanvas.width = window.innerWidth;
        let height = bgCanvas.height = window.innerHeight;
        
        let stars = [];
        for (let i = 0; i < 40; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                flicker: Math.random() * 0.02 + 0.005,
                angle: Math.random() * Math.PI * 2
            });
        }

        window.addEventListener('resize', () => {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
        });

        function animateBg() {
            bgCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.angle += star.flicker;
                const alpha = star.opacity + Math.sin(star.angle) * 0.2;
                bgCtx.fillStyle = currentTheme === 'light' 
                    ? `rgba(255, 117, 151, ${alpha})`
                    : `rgba(161, 127, 224, ${alpha})`;
                bgCtx.beginPath();
                bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                bgCtx.fill();
                star.y += star.size * 0.06;
                if (star.y > height) {
                    star.y = -10;
                    star.x = Math.random() * width;
                }
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();
    </script>
</body>
</html>
