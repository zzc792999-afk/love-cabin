<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📻 专属心动随身听 - 时光小屋</title>
    
    <!-- 谷歌字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff7597;
            --primary-dark: #e65275;
            --primary-light: #ffb6c1;
            --secondary: #a17fe0;
            --secondary-light: #c2aef2;
            
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
        }

        [data-theme="dark"] {
            --primary: #a17fe0;
            --primary-dark: #885fd1;
            --primary-light: #c2aef2;
            --secondary: #ff7597;
            
            --bg-grad: linear-gradient(135deg, #1e1b29 0%, #0f0d1a 100%);
            --card-bg: rgba(30, 24, 46, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-color: #ecf0f1;
            --text-muted: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-grad);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        /* 背景 Canvas 繁星效果 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        /* 顶部导航 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* 📻 随身听面板外壳 */
        .player-panel {
            background: var(--card-bg);
            border: var(--border-glass);
            border-radius: 32px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .player-header {
            text-align: center;
        }

        .player-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 📼 实体复古卡带随身听仓 */
        .walkman-case {
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35), inset 0 2px 5px rgba(255,255,255,0.2);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 玻璃视窗 */
        .walkman-window {
            width: 250px;
            height: 140px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 磁带盒 */
        .cassette {
            width: 210px;
            height: 110px;
            background: #ff7597; /* 磁带背景色 */
            border-radius: 8px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            transition: background-color 0.8s ease;
        }

        /* 磁带标签贴纸 */
        .cassette-label {
            width: 100%;
            height: 48px;
            background: #fff;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
            font-size: 0.75rem;
            font-weight: 800;
            border-bottom: 3px solid #ff4e50;
        }

        .cassette-label span {
            font-family: 'Kaiti', 'STKaiti', serif;
            font-size: 0.85rem;
            color: var(--primary-dark);
            letter-spacing: 1px;
        }

        /* 磁带双齿轮齿轮轴 */
        .cassette-gears {
            display: flex;
            justify-content: space-around;
            width: 100%;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            padding: 0 45px;
        }

        .gear {
            width: 32px;
            height: 32px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #2c3e50;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .gear::before {
            content: '';
            width: 14px;
            height: 14px;
            background: #2c3e50;
            border-radius: 50%;
        }

        /* 齿轮的轮辐，转动时能看出来 */
        .gear-spokes {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .gear-spokes::before, .gear-spokes::after {
            content: '';
            position: absolute;
            background: #2c3e50;
        }

        .gear-spokes::before {
            width: 4px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .gear-spokes::after {
            height: 4px;
            width: 100%;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        /* 齿轮旋转动画类 */
        .gear.spinning .gear-spokes {
            animation: spinGear 3s linear infinite;
        }

        @keyframes spinGear {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 下方的磁带孔与螺丝钉细节 */
        .cassette-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .screw {
            width: 6px;
            height: 6px;
            background: #7f8c8d;
            border-radius: 50%;
            position: relative;
        }

        .screw::before {
            content: '';
            width: 100%;
            height: 2px;
            background: #34495e;
            position: absolute;
            top: 2px;
            left: 0;
        }

        /* 📊 LED 音乐跳动均衡器 */
        .equalizer-canvas-container {
            width: 100%;
            max-width: 320px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
            border: var(--border-glass);
            overflow: hidden;
            padding: 0 10px;
        }

        #eq-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 🎛️ 物理播放按键板 */
        .controls-board {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .btn-control {
            width: 54px;
            height: 42px;
            background: linear-gradient(to bottom, #bdc3c7 0%, #95a5a6 100%);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            color: #2c3e50;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 2px 2px rgba(255,255,255,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.15s;
            position: relative;
            touch-action: manipulation;
        }

        .btn-control:active, .btn-control.active {
            transform: translateY(4px);
            background: linear-gradient(to bottom, #7f8c8d 0%, #95a5a6 100%);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1), inset 0 3px 5px rgba(0,0,0,0.4);
            color: var(--primary-dark);
        }

        /* 隐藏的真实音频 */
        #audio-element {
            display: none;
        }

        /* 提示卡片 */
        .tip-card {
            background: rgba(255, 255, 255, 0.2);
            border: var(--border-glass);
            border-radius: 20px;
            padding: 15px 20px;
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- 头部栏 -->
        <header>
            <a href="../index.html" class="btn-back"><i class="fas fa-home"></i> 时光小屋</a>
            <button id="theme-btn" class="btn-back" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center;" title="切换主题"><i class="fas fa-moon"></i></button>
        </header>

        <!-- 📻 播放器主体 -->
        <div class="player-panel">
            <div class="player-header">
                <h2>📻 专属心动随身听</h2>
                <p id="track-name">哲哲给珊珊的专属情歌 BGM</p>
            </div>

            <!-- 卡带实体机舱 -->
            <div class="walkman-case">
                <div class="walkman-window">
                    <div class="cassette" id="cassette-body">
                        <div class="cassette-label">
                            <span id="label-text">哲哲的语音 & 专属BGM</span>
                            <div style="font-size: 0.6rem; color: var(--text-muted); margin-top: 2px;">STEREO · SIDE A</div>
                        </div>
                        
                        <!-- 双齿轮轴 -->
                        <div class="cassette-gears">
                            <div class="gear" id="gear-l">
                                <div class="gear-spokes"></div>
                            </div>
                            <div class="gear" id="gear-r">
                                <div class="gear-spokes"></div>
                            </div>
                        </div>

                        <!-- 底部细节 -->
                        <div class="cassette-bottom">
                            <div class="screw"></div>
                            <div style="width: 25px; height: 10px; background: rgba(0,0,0,0.15); border-radius: 2px;"></div>
                            <div class="screw"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LED 流光均衡器 -->
            <div class="equalizer-canvas-container">
                <canvas id="eq-canvas"></canvas>
            </div>

            <!-- 物理按键板 -->
            <div class="controls-board">
                <!-- 停止 -->
                <button class="btn-control" id="btn-stop" title="停止"><i class="fas fa-stop"></i></button>
                <!-- 播放 -->
                <button class="btn-control" id="btn-play" title="播放"><i class="fas fa-play"></i></button>
                <!-- 暂停 -->
                <button class="btn-control" id="btn-pause" title="暂停"><i class="fas fa-pause"></i></button>
            </div>
        </div>

        <!-- 提示板 -->
        <div class="tip-card">
            <p>💡 **卡带随身听提示**：</p>
            <p style="color: var(--text-muted); margin-top: 5px;">本随身听支持播放 `other2` 文件夹下的音频。如果您在 `other2/` 目录下放置了自定义的 `music.mp3`，它将自动载入并播放哦！如果离线打开或没有该文件，系统会自动启用 Web Audio 盒式电子琴和备用音轨为您演奏。</p>
        </div>
    </div>

    <!-- 真实音频标签 -->
    <audio id="audio-element" loop>
        <source src="../other2/music.mp3" type="audio/mp3">
        <source src="../other2/1 (1).mp4" type="audio/mp4"> <!-- 支持把拍视频的音轨拖过来播放 -->
    </audio>

    <script>
        // 🛡️ 安全本地存储
        function safeGet(key, defaultVal = '') {
            try {
                return localStorage.getItem(key) || defaultVal;
            } catch (e) {
                try {
                    return sessionStorage.getItem(key) || defaultVal;
                } catch (err) {
                    return window[`__safe_storage_${key}`] || defaultVal;
                }
            }
        }

        function safeSet(key, val) {
            try {
                localStorage.setItem(key, val);
            } catch (e) {
                try {
                    sessionStorage.setItem(key, val);
                } catch (err) {
                    window[`__safe_storage_${key}`] = val;
                }
            }
        }

        // 🌗 主题自动匹配
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = safeGet('theme', 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            safeSet('theme', currentTheme);
            updateThemeIcon();
            updateCassetteColor();
        });

        function updateThemeIcon() {
            themeBtn.innerHTML = currentTheme === 'light' 
                ? '<i class="fas fa-moon"></i>' 
                : '<i class="fas fa-sun"></i>';
        }

        const cassetteBody = document.getElementById('cassette-body');
        function updateCassetteColor() {
            if (currentTheme === 'light') {
                cassetteBody.style.backgroundColor = '#ff7597';
                cassetteBody.style.borderColor = '#fff';
            } else {
                cassetteBody.style.backgroundColor = '#a17fe0';
                cassetteBody.style.borderColor = 'rgba(255,255,255,0.2)';
            }
        }
        updateCassetteColor();

        // 🔊 Audio API 均衡器与播放引擎
        const audioEl = document.getElementById('audio-element');
        const gearL = document.getElementById('gear-l');
        const gearR = document.getElementById('gear-r');
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnStop = document.getElementById('btn-stop');
        
        let audioCtx = null;
        let analyser = null;
        let dataArray = [];
        let isPlaying = false;
        let isUsingFallbackSynth = false;

        // 初始化 Web Audio API 用于 procedural 音乐盒
        function initAudioEngine() {
            if (!audioCtx) {
                const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioCtxClass();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 触发齿轮转动
        function startGears() {
            gearL.classList.add('spinning');
            gearR.classList.add('spinning');
        }

        function stopGears() {
            gearL.classList.remove('spinning');
            gearR.classList.remove('spinning');
        }

        // 🎹 纯代码合成“音乐盒”备用旋律（在没有 music.mp3 时，给珊珊演奏优美的和弦）
        let synthInterval = null;
        const MELODY = [
            261.63, 329.63, 392.00, 523.25, // C Major (C4, E4, G4, C5)
            293.66, 349.23, 440.00, 587.33, // D minor (D4, F4, A4, D5)
            329.63, 392.00, 493.88, 659.25, // E minor (E4, G4, B4, E5)
            349.23, 440.00, 523.25, 698.46  // F Major (F4, A4, C5, F5)
        ];
        let noteIdx = 0;

        function startFallbackSynth() {
            if (synthInterval) return;
            isUsingFallbackSynth = true;
            synthInterval = setInterval(() => {
                try {
                    if (!audioCtx) return;
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    // 播放音乐盒风格的水晶声
                    osc.type = 'sine';
                    const freq = MELODY[noteIdx % MELODY.length];
                    osc.frequency.setValueAtTime(freq, now);
                    
                    gain.gain.setValueAtTime(0.001, now);
                    gain.gain.linearRampToValueAtTime(0.06, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    
                    osc.start(now);
                    osc.stop(now + 1.2);
                    
                    noteIdx = (noteIdx + 1) % MELODY.length;
                } catch(e) {}
            }, 300);
        }

        function stopFallbackSynth() {
            if (synthInterval) {
                clearInterval(synthInterval);
                synthInterval = null;
            }
            isUsingFallbackSynth = false;
        }

        let isCustomMusic = false;

        // 播放控制
        btnPlay.addEventListener('click', () => {
            initAudioEngine();
            
            // 尝试播放 mp3
            audioEl.play().then(() => {
                isPlaying = true;
                btnPlay.classList.add('active');
                btnPause.classList.remove('active');
                document.getElementById('track-name').textContent = isCustomMusic 
                    ? "正在播放: 云端自定义心动BGM 🎵"
                    : "正在播放: 哲哲的专属心动BGM 🎵";
                startGears();
            }).catch(err => {
                // 播放失败代表没有 music.mp3 文件，启动代码合成电子琴音乐盒
                console.log('No music file or playback error. Playing synthesized music box.');
                isPlaying = true;
                btnPlay.classList.add('active');
                btnPause.classList.remove('active');
                document.getElementById('track-name').textContent = "正在演奏: 程序合成心动八音盒 🎹";
                startGears();
                startFallbackSynth();
            });
        });

        // 暂停控制
        btnPause.addEventListener('click', () => {
            audioEl.pause();
            stopFallbackSynth();
            isPlaying = false;
            stopGears();
            btnPlay.classList.remove('active');
            btnPause.classList.add('active');
        });

        // 停止控制
        btnStop.addEventListener('click', () => {
            audioEl.pause();
            audioEl.currentTime = 0;
            stopFallbackSynth();
            isPlaying = false;
            stopGears();
            btnPlay.classList.remove('active');
            btnPause.classList.remove('active');
            document.getElementById('track-name').textContent = "随身听已停止";
        });

        // 📊 均衡器渲染 Canvas
        const eqCanvas = document.getElementById('eq-canvas');
        const eqCtx = eqCanvas.getContext('2d');
        const eqWidth = eqCanvas.width = 300;
        const eqHeight = eqCanvas.height = 50;

        function drawEqualizer() {
            eqCtx.clearRect(0, 0, eqWidth, eqHeight);
            
            const barWidth = 6;
            const barGap = 4;
            const numBars = 24;
            
            if (isPlaying) {
                const time = Date.now() * 0.006;
                for (let i = 0; i < numBars; i++) {
                    // 使用多重正弦波与随机噪声叠加，模拟极度自然的音乐起伏
                    const baseVal = Math.sin(time + i * 0.15) * 0.4 + 0.5;
                    const noise = Math.sin(time * 2.3 + i * 0.7) * 0.15;
                    const value = Math.max(0.1, Math.min(1, baseVal + noise));
                    
                    const barHeight = value * eqHeight * 0.85;
                    const x = i * (barWidth + barGap) + (eqWidth - numBars * (barWidth + barGap)) / 2;
                    const y = eqHeight - barHeight;
                    
                    // 粉红到紫色的流光渐变色
                    const grad = eqCtx.createLinearGradient(x, y, x, eqHeight);
                    if (currentTheme === 'light') {
                        grad.addColorStop(0, '#ff7597');
                        grad.addColorStop(1, '#ffb6c1');
                    } else {
                        grad.addColorStop(0, '#a17fe0');
                        grad.addColorStop(1, '#c2aef2');
                    }
                    
                    eqCtx.fillStyle = grad;
                    eqCtx.fillRect(x, y, barWidth, barHeight);
                }
            } else {
                // 停止时渲染一排微弱的底噪小灰点
                for (let i = 0; i < numBars; i++) {
                    const x = i * (barWidth + barGap) + (eqWidth - numBars * (barWidth + barGap)) / 2;
                    eqCtx.fillStyle = currentTheme === 'light' ? '#ddd' : '#3d324c';
                    eqCtx.fillRect(x, eqHeight - 4, barWidth, 3);
                }
            }
            
            requestAnimationFrame(drawEqualizer);
        }
        drawEqualizer();

        // 🌌 繁星粒子背景 Canvas
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width = bgCanvas.width = window.innerWidth;
        let height = bgCanvas.height = window.innerHeight;
        
        let stars = [];
        for (let i = 0; i < 40; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                flicker: Math.random() * 0.02 + 0.005,
                angle: Math.random() * Math.PI * 2
            });
        }

        window.addEventListener('resize', () => {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
        });

        function animateBg() {
            bgCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.angle += star.flicker;
                const alpha = star.opacity + Math.sin(star.angle) * 0.2;
                bgCtx.fillStyle = currentTheme === 'light' 
                    ? `rgba(255, 117, 151, ${alpha})`
                    : `rgba(161, 127, 224, ${alpha})`;
                bgCtx.beginPath();
                bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                bgCtx.fill();
                star.y += star.size * 0.06;
                if (star.y > height) {
                    star.y = -10;
                    star.x = Math.random() * width;
                }
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // 异步向云数据库拉取最新背景音乐配置
        fetch('/api/config')
            .then(res => res.json())
            .then(cfg => {
                if (cfg.config_bg_music_url && cfg.config_bg_music_url.trim()) {
                    const audioEl = document.getElementById('audio-element');
                    if (audioEl) {
                        audioEl.innerHTML = `<source src="${cfg.config_bg_music_url.trim()}" type="audio/mpeg">`;
                        audioEl.load();
                        isCustomMusic = true;
                    }
                }
            })
            .catch(e => console.warn("Sync configuration in player failed:", e));
    </script>
</body>
</html>
