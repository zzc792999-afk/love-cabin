<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 甜蜜回忆拼图 - 时光小屋</title>
    
    <!-- 谷歌字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff7597;
            --primary-dark: #e65275;
            --primary-light: #ffb6c1;
            --secondary: #a17fe0;
            --secondary-light: #c2aef2;
            
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
        }

        [data-theme="dark"] {
            --primary: #a17fe0;
            --primary-dark: #885fd1;
            --primary-light: #c2aef2;
            --secondary: #ff7597;
            
            --bg-grad: linear-gradient(135deg, #1e1b29 0%, #0f0d1a 100%);
            --card-bg: rgba(30, 24, 46, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-color: #ecf0f1;
            --text-muted: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-grad);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        /* 背景 Canvas 繁星效果 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        /* 顶部导航 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* 🎮 拼图游戏面板 */
        .puzzle-panel {
            background: var(--card-bg);
            border: var(--border-glass);
            border-radius: 32px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .puzzle-header {
            text-align: center;
        }

        .puzzle-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .puzzle-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* 🧩 拼图主体 3x3 棋盘网格 */
        .puzzle-board {
            width: 300px;
            height: 300px;
            background: rgba(0,0,0,0.1);
            border: 4px solid #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
        }

        .puzzle-tile {
            width: 100%;
            height: 100%;
            background-size: 294px 294px; /* 300 - borders */
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 1px rgba(255,255,255,0.8), 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            touch-action: manipulation;
        }

        .puzzle-tile.empty {
            background: transparent !important;
            box-shadow: none !important;
            cursor: default;
        }

        /* 标记可滑动方块的鼠标悬浮和按压微动效 */
        .puzzle-tile.slideable {
            cursor: pointer;
        }

        .puzzle-tile.slideable:active {
            transform: scale(0.94);
        }

        @media (hover: hover) {
            .puzzle-tile.slideable:hover {
                box-shadow: inset 0 0 0 3px var(--primary), 0 4px 10px rgba(255, 117, 151, 0.2);
                transform: scale(0.96);
            }
        }

        /* 操作控制区 */
        .puzzle-controls {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 78, 80, 0.25);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 78, 80, 0.4);
        }

        .btn-preview {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-color);
        }

        .btn-preview:hover {
            background: white;
            color: #333;
        }

        /* 预览图片小遮罩 */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .preview-image-box {
            width: 280px;
            height: 280px;
            border: 4px solid #fff;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* 通关大礼包券 */
        .reward-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 18, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reward-card {
            width: 100%;
            max-width: 360px;
            background: #fffdf5;
            border-radius: 24px;
            border: 4px solid #ffd700;
            box-shadow: 0 25px 65px rgba(0,0,0,0.4);
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transform: scale(0.3) rotate(-10deg);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .reward-card.show {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        .coupon-code {
            font-family: 'Outfit', monospace;
            font-size: 1.25rem;
            font-weight: 800;
            color: #d4af37;
            background: #fdfcf7;
            border: 2px dashed rgba(255,215,0,0.5);
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .coupon-code:hover {
            transform: scale(1.05);
            background: #fffdf3;
        }

        /* 吐司通知 */
        .toast {
            position: fixed;
            bottom: 40px;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 100000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- 头部栏 -->
        <header>
            <a href="../index.html" class="btn-back"><i class="fas fa-home"></i> 时光小屋</a>
            <button id="theme-btn" class="btn-back" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center;" title="切换主题"><i class="fas fa-moon"></i></button>
        </header>

        <!-- 🎮 拼图面板 -->
        <div class="puzzle-panel">
            <div class="puzzle-header">
                <h2>🧩 甜蜜回忆拼图</h2>
                <p>点击与空白格相邻的方块即可移动它。还原合照通关，可以赢取扭蛋券暗号哦！</p>
            </div>

            <!-- 3x3 棋盘 -->
            <div class="puzzle-board" id="puzzle-board-element">
                <!-- 由JS根据合图动态生成块 -->
            </div>

            <!-- 控制区 -->
            <div class="puzzle-controls">
                <button class="btn-action btn-preview" id="btn-show-preview"><i class="far fa-image"></i> 对比原图</button>
                <button class="btn-action" id="btn-shuffle"><i class="fas fa-random"></i> 重新打乱</button>
            </div>
        </div>
    </div>

    <!-- 🖼️ 对比原图遮罩层 -->
    <div class="preview-overlay" id="preview-overlay-element">
        <h3 style="color: white; font-weight: 800;"><i class="far fa-image"></i> 回忆原图参考</h3>
        <div class="preview-image-box" id="preview-box"></div>
        <button class="btn-action btn-preview" style="background: white; color: black; border: none;" id="btn-close-preview">返回游戏</button>
    </div>

    <!-- 🏆 通关奖品遮罩层 -->
    <div class="reward-overlay" id="reward-overlay-element">
        <div class="reward-card" id="reward-card-element">
            <div style="font-size: 3rem;">🏆</div>
            <h2 style="font-weight: 800; background: linear-gradient(45deg, #f9d423, #ff4e50); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">拼图成功！</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;">拼凑起日常的细碎瞬间，就变成了我们完整的幸福！珊珊太棒啦，这是奖励给珊珊的扭蛋充值密令，快去充值吧：</p>
            
            <div class="coupon-code" id="btn-copy-coupon" title="点击一键复制">
                <span id="coupon-code-val">PUZZLE-CHAMPION-999</span>
                <i class="far fa-copy"></i>
            </div>
            <div style="font-size: 0.7rem; color: var(--primary-dark); font-weight: 800; margin-top: -5px;">🔒 限兑一次 · 自动获取扭蛋次数 +1</div>
            
            <div style="display: flex; gap: 15px; width: 100%; justify-content: center;">
                <a href="gashapon.html" class="btn-action" style="padding: 10px 30px;"><i class="fas fa-gamepad"></i> 前往扭蛋机</a>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast-el">已复制特权暗号！</div>

    <script>
        // 🛡️ 安全本地存储
        function safeGet(key, defaultVal = '') {
            try {
                return localStorage.getItem(key) || defaultVal;
            } catch (e) {
                try {
                    return sessionStorage.getItem(key) || defaultVal;
                } catch (err) {
                    return window[`__safe_storage_${key}`] || defaultVal;
                }
            }
        }

        function safeSet(key, val) {
            try {
                localStorage.setItem(key, val);
            } catch (e) {
                try {
                    sessionStorage.setItem(key, val);
                } catch (err) {
                    window[`__safe_storage_${key}`] = val;
                }
            }
        }

        // 🌗 主题自动匹配
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = safeGet('theme', 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            safeSet('theme', currentTheme);
            updateThemeIcon();
        });

        function updateThemeIcon() {
            themeBtn.innerHTML = currentTheme === 'light' 
                ? '<i class="fas fa-moon"></i>' 
                : '<i class="fas fa-sun"></i>';
        }

        // 🔊 Web Audio API 音效合成器
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
        }

        // 滑动卡哒声
        function playSlideSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.06);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                osc.start(now);
                osc.stop(now + 0.06);
            } catch(e) {}
        }

        function playWinSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                playTone(523.25, now, 0.12);
                playTone(659.25, now + 0.08, 0.12);
                playTone(783.99, now + 0.16, 0.12);
                playTone(1046.50, now + 0.24, 0.4);
            } catch(e) {}
        }

        function playTone(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.08, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.start(start);
            osc.stop(start + duration);
        }

        // 🖼️ 容错性图像源设置：将空格及括号进行 URL 编码，解决部分手机文件管理器识别空格路径 Bug
        const realImgUrl = '../other2/1%20(1).jpg';
        
        // 使用 Base64 动态编码 SVG 字符串，解决 iOS Safari/Chrome 对 DataURI 中 raw "#" 字符的解析闪退 Bug
        const svgString = '<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff7597" /><stop offset="100%" style="stop-color:#a17fe0" /></linearGradient></defs><rect width="300" height="300" fill="url(#g)" /><text x="150" y="140" fill="white" font-size="70" text-anchor="middle">💖</text><text x="150" y="210" fill="white" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">Our Sweet Love</text></svg>';
        const fallbackUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
        
        let puzzleImgUrl = realImgUrl;

        // 预载测试
        const testImg = new Image();
        testImg.src = realImgUrl;
        testImg.onload = () => {
            puzzleImgUrl = realImgUrl;
            initPuzzleGame();
        };
        testImg.onerror = () => {
            console.log('Real couple image not found, switching to design fallback.');
            puzzleImgUrl = fallbackUrl;
            initPuzzleGame();
        };

        // 🧩 拼图逻辑引擎
        const board = document.getElementById('puzzle-board-element');
        let tiles = [];
        let emptyIndex = 8; // 右下角默认为空

        function initPuzzleGame() {
            // 绑定原图预览图
            document.getElementById('preview-box').style.backgroundImage = `url('${puzzleImgUrl}')`;
            
            // 构造九宫格：0-7是切图，8是空白
            tiles = [];
            for (let i = 0; i < 8; i++) {
                tiles.push({
                    correctIndex: i,
                    currentIndex: i
                });
            }
            tiles.push({
                correctIndex: 8,
                currentIndex: 8,
                isEmpty: true
            });

            shuffleTiles();
            renderBoard();
        }

        // 打乱滑块（只打乱有解的布局，多次随机滑动）
        function shuffleTiles() {
            // 从完美的 0-8 状态开始，随机滑动 80 次
            emptyIndex = 8;
            for (let i = 0; i < 80; i++) {
                const adjacents = getAdjacents(emptyIndex);
                const rollIndex = adjacents[Math.floor(Math.random() * adjacents.length)];
                
                // 交换
                const temp = tiles[emptyIndex];
                tiles[emptyIndex] = tiles[rollIndex];
                tiles[rollIndex] = temp;
                
                emptyIndex = rollIndex;
            }
        }

        // 获取相邻滑块索引
        function getAdjacents(idx) {
            const list = [];
            const r = Math.floor(idx / 3);
            const c = idx % 3;
            
            if (r > 0) list.push(idx - 3); // 上
            if (r < 2) list.push(idx + 3); // 下
            if (c > 0) list.push(idx - 1); // 左
            if (c < 2) list.push(idx + 1); // 右
            
            return list;
        }

        // 渲染棋盘
        function renderBoard() {
            board.innerHTML = '';
            const adjacentsOfEmpty = getAdjacents(emptyIndex);
            
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                if (tile.isEmpty) {
                    div.className = 'puzzle-tile empty';
                } else {
                    div.className = 'puzzle-tile';
                    div.style.backgroundImage = `url('${puzzleImgUrl}')`;
                    
                    // 根据原始正确索引 correctIndex 计算背景偏移
                    const cIdx = tile.correctIndex;
                    const row = Math.floor(cIdx / 3);
                    const col = cIdx % 3;
                    
                    // 每格 98px (300 - 6格缝) / 3
                    const offsetVal = 98; 
                    div.style.backgroundPosition = `-${col * offsetVal}px -${row * offsetVal}px`;
                    
                    // 标记当前可以滑动的相邻方块，供CSS展现按压微动效
                    if (adjacentsOfEmpty.includes(index)) {
                        div.classList.add('slideable');
                    }
                    
                    // 点击交换
                    div.addEventListener('click', () => {
                        handleTileClick(index);
                    });
                }
                board.appendChild(div);
            });
        }

        // 滑动交换
        function handleTileClick(index) {
            initAudio();
            const adjacents = getAdjacents(index);
            
            if (adjacents.includes(emptyIndex)) {
                playSlideSound();
                
                // 交换
                const temp = tiles[index];
                tiles[index] = tiles[emptyIndex];
                tiles[emptyIndex] = temp;
                
                emptyIndex = index;
                renderBoard();
                
                // 判断赢家
                checkWin();
            }
        }

        // 赢家校验
        function checkWin() {
            let isWin = true;
            for (let i = 0; i < tiles.length; i++) {
                if (tiles[i].correctIndex !== i) {
                    isWin = false;
                    break;
                }
            }
            
            if (isWin) {
                setTimeout(() => {
                    playWinSound();
                    
                    // 把空格子复原显示，展示完整大图效果
                    const emptyTileEl = document.querySelector('.puzzle-tile.empty');
                    if (emptyTileEl) {
                        emptyTileEl.className = 'puzzle-tile';
                        emptyTileEl.style.backgroundImage = `url('${puzzleImgUrl}')`;
                        emptyTileEl.style.backgroundPosition = '-196px -196px'; // 2*98
                    }
                    
                    // 弹出奖励
                    showRewardOverlay();
                }, 400);
            }
        }

        // 重新打乱
        document.getElementById('btn-shuffle').addEventListener('click', () => {
            initAudio();
            shuffleTiles();
            renderBoard();
        });

        // 预览浮窗控制
        const previewOverlay = document.getElementById('preview-overlay-element');
        document.getElementById('btn-show-preview').addEventListener('click', () => {
            initAudio();
            previewOverlay.style.display = 'flex';
        });

        document.getElementById('btn-close-preview').addEventListener('click', () => {
            previewOverlay.style.display = 'none';
        });

        // 奖励浮窗
        const rewardOverlay = document.getElementById('reward-overlay-element');
        const rewardCard = document.getElementById('reward-card-element');

        function showRewardOverlay() {
            rewardOverlay.style.display = 'flex';
            setTimeout(() => {
                rewardCard.classList.add('show');
                triggerMiniConfetti();
            }, 50);

            // 👑 标记通关并上传同步至云端数据库
            if (safeGet('puzzle_completed') !== 'true') {
                safeSet('puzzle_completed', 'true');
                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ puzzle_completed: 'true' })
                }).catch(e => console.error("Cloud puzzle sync failed:", e));
            }
        }

        // 复制券码
        const btnCopy = document.getElementById('btn-copy-coupon');
        const toastEl = document.getElementById('toast-el');

        btnCopy.addEventListener('click', () => {
            initAudio();
            const val = document.getElementById('coupon-code-val').textContent;
            navigator.clipboard.writeText(val).then(() => {
                toastEl.classList.add('show');
                playTone(880, audioCtx.currentTime, 0.2);
                setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 2000);
            }).catch(() => {
                alert('您的设备不支持自动复制，请手动复制：' + val);
            });
        });

        // 🏆 小心形礼花爆破
        function triggerMiniConfetti() {
            const emojis = ['💖', '💕', '✨', '🌸', '❤️'];
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const frag = document.createElement('div');
                    frag.className = 'balloon-fragment';
                    frag.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    frag.style.left = (screenW / 2) + 'px';
                    frag.style.top = (screenH / 2) + 'px';
                    frag.style.fontSize = Math.random() * 15 + 15 + 'px';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 200 + 70;
                    const tx = Math.cos(angle) * dist;
                    const ty = Math.sin(angle) * dist;
                    
                    frag.style.setProperty('--tx', tx + 'px');
                    frag.style.setProperty('--ty', ty + 'px');
                    
                    document.body.appendChild(frag);
                    setTimeout(() => frag.remove(), 1000);
                }, i * 20);
            }
        }

        // 🌌 繁星粒子背景 Canvas
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width = bgCanvas.width = window.innerWidth;
        let height = bgCanvas.height = window.innerHeight;
        
        let stars = [];
        for (let i = 0; i < 40; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5 + 0.5,
                opacity: Math.random() * 0.6 + 0.2,
                flicker: Math.random() * 0.02 + 0.005,
                angle: Math.random() * Math.PI * 2
            });
        }

        window.addEventListener('resize', () => {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
        });

        function animateBg() {
            bgCtx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.angle += star.flicker;
                const alpha = star.opacity + Math.sin(star.angle) * 0.2;
                bgCtx.fillStyle = currentTheme === 'light' 
                    ? `rgba(255, 117, 151, ${alpha})`
                    : `rgba(161, 127, 224, ${alpha})`;
                bgCtx.beginPath();
                bgCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                bgCtx.fill();
                star.y += star.size * 0.06;
                if (star.y > height) {
                    star.y = -10;
                    star.x = Math.random() * width;
                }
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // 启动拼图与背景 (优先读取本地缓存，随后拉取云端状态校验)
        const cachedCompleted = safeGet('puzzle_completed') === 'true';
        if (cachedCompleted) {
            showRewardOverlay();
        }

        // 异步向云端同步状态
        fetch('/api/config')
            .then(res => res.json())
            .then(cfg => {
                if (cfg.puzzle_completed !== undefined) {
                    safeSet('puzzle_completed', String(cfg.puzzle_completed));
                    const isNowCompleted = cfg.puzzle_completed === 'true';
                    if (isNowCompleted) {
                        showRewardOverlay();
                    } else {
                        // 如果管理员在后台重置了，则隐藏奖励覆盖图
                        rewardOverlay.style.display = 'none';
                        rewardCard.classList.remove('show');
                    }
                }
            })
            .catch(e => console.warn("Sync puzzle configuration failed:", e));
    </script>
</body>
</html>
