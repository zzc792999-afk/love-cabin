<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎟️ 恋爱心动刮刮乐 - 时光小屋</title>
    
    <!-- 谷歌字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff7597;
            --primary-dark: #e65275;
            --primary-light: #ffb6c1;
            --secondary: #a17fe0;
            --secondary-light: #c2aef2;
            
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            
            --text-color: #2c3e50;
            --text-muted: #7f8c8d;
        }

        [data-theme="dark"] {
            --primary: #a17fe0;
            --primary-dark: #885fd1;
            --primary-light: #c2aef2;
            --secondary: #ff7597;
            
            --bg-grad: linear-gradient(135deg, #1e1b29 0%, #0f0d1a 100%);
            --card-bg: rgba(30, 24, 46, 0.45);
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            --text-color: #ecf0f1;
            --text-muted: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-grad);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }

        /* 繁星背景Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        /* 顶部导航 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
        }

        /* 刮刮卡外壳 */
        .scratch-panel {
            background: var(--card-bg);
            border: var(--border-glass);
            border-radius: 32px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            gap: 20px;
        }

        .scratch-title-box {
            text-align: center;
        }

        .scratch-title-box h2 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .scratch-title-box p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 卡包选择器 */
        .deck-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .deck-btn {
            background: var(--card-bg);
            border: var(--border-glass);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-glass);
        }

        .deck-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }

        /* 刮刮卡卡体 */
        .scratch-card-box {
            width: 320px;
            height: 420px;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            background: #fff;
            border: 5px solid #fff;
            transition: transform 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        [data-theme="dark"] .scratch-card-box {
            background: #252233;
            border-color: #252233;
        }

        /* 卡底内容 */
        .card-content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        .card-inner-border {
            border: 2px dashed rgba(255,117,151,0.3);
            border-radius: 18px;
            width: 100%;
            height: 100%;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .prize-emoji {
            font-size: 4rem;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
            animation: floatEmoji 2.5s infinite ease-in-out;
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(5deg); }
        }

        .prize-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #333;
            margin-top: 10px;
        }

        [data-theme="dark"] .prize-title {
            color: #ecf0f1;
        }

        .prize-desc {
            font-size: 0.92rem;
            color: #555;
            line-height: 1.6;
            font-weight: 500;
            margin: 10px 0;
        }

        [data-theme="dark"] .prize-desc {
            color: #bdc3c7;
        }

        .prize-tag {
            font-size: 0.75rem;
            color: var(--primary-dark);
            font-weight: 800;
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 10px;
            width: 100%;
        }

        /* 刮奖图层Canvas */
        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
            border-radius: 20px;
            transition: opacity 0.5s ease;
        }

        /* 次数显示与操作 */
        .status-bar {
            background: rgba(255, 117, 151, 0.12);
            border: 1px solid rgba(255, 117, 151, 0.25);
            padding: 8px 18px;
            border-radius: 50px;
            color: var(--primary-dark);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255,117,151,0.05);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,117,151,0.3);
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255,117,151,0.45);
        }

        .btn-action:disabled {
            background: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 特权钱包面板 */
        .wallet-panel {
            background: var(--card-bg);
            border: var(--border-glass);
            border-radius: 28px;
            box-shadow: var(--shadow-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
        }

        .wallet-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .wallet-card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .wallet-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 117, 151, 0.3);
        }

        .wallet-card.empty {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .wallet-card.empty:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-badge-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary-dark);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .wallet-card.empty .card-badge-count {
            background: var(--text-muted);
        }

        .card-emoji {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .card-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* 兑换展示遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal-card {
            width: 290px;
            aspect-ratio: 3/4.6;
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 4px solid var(--primary);
            transition: all 0.5s ease;
        }

        .btn-use-prize {
            margin-top: 15px;
            background: linear-gradient(135deg, #f9d423, #ff4e50);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,78,80,0.3);
            transition: all 0.3s;
        }

        .btn-close-modal {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-close-modal:hover {
            background: white;
            color: #121012;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .scratch-card-box {
                width: 280px;
                height: 380px;
            }
            .wallet-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- 导航 -->
        <header>
            <a href="../index.html" class="btn-back"><i class="fas fa-home"></i> 时光小屋</a>
            <button id="theme-btn" class="btn-back" style="border-radius: 50%; width: 42px; height: 42px; padding: 0; justify-content: center;" title="切换主题"><i class="fas fa-moon"></i></button>
        </header>

        <!-- 🎟️ 刮刮乐面板 -->
        <div class="scratch-panel">
            <div class="scratch-title-box">
                <h2>🎟️ 恋爱心动刮刮乐</h2>
                <p>指尖划过银河，解封只属于珊珊的恋爱特权</p>
            </div>

            <!-- 卡包选择 -->
            <div class="deck-selector">
                <button class="deck-btn active" onclick="switchDeck('privilege', this)">🍬 甜蜜特权卡</button>
                <button class="deck-btn" onclick="switchDeck('penalty', this)">🧸 搞怪惩罚卡</button>
                <button class="deck-btn" onclick="switchDeck('wish', this)">✨ 至尊心愿卡</button>
            </div>

            <!-- 刮刮乐卡体 -->
            <div class="scratch-card-box" id="scratch-card-container">
                <!-- 刮奖图层 Canvas -->
                <canvas class="scratch-canvas" id="scratch-canvas"></canvas>
                
                <!-- 卡底内容 -->
                <div class="card-content-layer" id="card-content-layer">
                    <div class="card-inner-border" id="card-inner-frame">
                        <div class="prize-emoji" id="prize-emoji">💋</div>
                        <div>
                            <h3 class="prize-title" id="prize-title">啵啵卡</h3>
                            <p class="prize-desc" id="prize-desc">凭此券可向哲哲兑换大杯茶百道...</p>
                        </div>
                        <div class="prize-tag">🔒 珊珊的专属特权 · 哲哲承诺兑现</div>
                    </div>
                </div>
            </div>

            <!-- 状态和操作 -->
            <div class="status-bar">
                <span>💖 今日免费：<span id="free-scratches-count">1</span> 次</span>
                <span style="margin: 0 8px; opacity: 0.3;">|</span>
                <span>🎁 额外机会：<span id="extra-scratches-count">0</span> 次</span>
            </div>

            <div style="margin-top: 15px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                <button class="btn-action" id="btn-action" onclick="buyNewCard()" style="margin: 0; flex: 1; min-width: 200px;">🎁 解锁今日免费刮刮乐</button>
                <button class="btn-action" id="btn-redeem" onclick="redeemScratchKey()" style="margin: 0; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); font-size: 0.85rem; max-width: 150px; flex: 1;"><i class="fas fa-key"></i> 兑换特权暗号</button>
            </div>
        </div>

        <!-- 🎒 背包/钱包面板 -->
        <div class="wallet-panel">
            <h3 class="wallet-title"><i class="fas fa-wallet"></i> 珊珊的专属特权钱包</h3>
            <div class="wallet-grid" id="wallet-cards-container">
                <!-- 背包格将动态填入 -->
            </div>
        </div>
    </div>

    <!-- 兑换卡片核销弹窗 -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card" id="modal-card-element">
            <div class="card-inner-border" style="border-color: rgba(0,0,0,0.1); height: 100%; justify-content: space-between; display: flex; flex-direction: column; align-items: center;">
                <div class="prize-emoji" id="modal-emoji-val">🥤</div>
                <div>
                    <h4 class="prize-title" id="modal-name-val" style="color: #333; font-size: 1.3rem;">奶茶续命券</h4>
                    <p class="prize-desc" id="modal-desc-val" style="color: #666; font-size: 0.85rem; line-height: 1.5; margin: 10px 0;">兑换一杯珊珊爱喝的奶茶！</p>
                </div>
                <div class="prize-tag" style="color: #888;">🔒 私人恋爱特权 · 哲哲承诺兑现</div>
            </div>
        </div>
        <button class="btn-use-prize" id="btn-use-prize">确定核销一张</button>
        <button class="btn-close-modal" onclick="closeModal()">关闭</button>
    </div>

    <script>
        // 🔒 安全本地存储防范 file:// 协议报错
        function safeGet(key, defaultVal = '') {
            try {
                return localStorage.getItem(key) || defaultVal;
            } catch (e) {
                try {
                    return sessionStorage.getItem(key) || defaultVal;
                } catch (err) {
                    return window[`__safe_storage_${key}`] || defaultVal;
                }
            }
        }

        function safeSet(key, val) {
            try {
                localStorage.setItem(key, val);
            } catch (e) {
                try {
                    sessionStorage.setItem(key, val);
                } catch (err) {
                    window[`__safe_storage_${key}`] = val;
                }
            }
        }

        // 🎫 特权数据库 (与扭蛋机一致，保持共享背包资产)
        let ALL_PRIZES = [
            { id: 'sleep', name: '哄睡唱歌券', emoji: '💤', desc: '哲哲今晚必须给珊珊讲睡前故事或唱歌，直到珊珊安稳睡着！', hue: 220, type: 'privilege' },
            { id: 'breakfast', name: '爱心早餐券', emoji: '🍳', desc: '哲哲需要亲手做或给外卖一份精美的爱心早餐送达珊珊！', hue: 30, type: 'privilege' },
            { id: 'massage', name: '专属按摩券', emoji: '💆', desc: '哲哲为珊珊提供15分钟头部/肩颈/足部舒适按摩，手法可定制！', hue: 90, type: 'privilege' },
            
            { id: 'no_angry', name: '免气金牌券', emoji: '🚫', desc: '今天如果珊珊生气，哲哲必须在3分钟内无条件逗笑她，不准还嘴！', hue: 340, type: 'penalty' },
            { id: 'yes_day', name: '全天听话券', emoji: '🙆', desc: '今天哲哲对珊珊的合理要求只能说好的，当一天的‘Yes-Man’！', hue: 120, type: 'penalty' },
            { id: 'secret_gift', name: '神秘惊喜券', emoji: '🎁', desc: '哲哲需要在3天内给珊珊准备一份贴心小惊喜/小礼物！', hue: 40, type: 'penalty' },
            { id: 'blackmail', name: '表情包销毁券', emoji: '📸', desc: '无条件销毁一张哲哲手机里珊珊的搞怪照片或表情包！', hue: 270, type: 'penalty' },
            
            { id: 'hug_tick', name: '深情熊抱券', emoji: '🤗', desc: '兑换一次长达60秒以上的超深熊抱，随时为珊珊补充能量！', hue: 350, type: 'wish' },
            { id: 'nickname', name: '肉麻爱称券', emoji: '🏷️', desc: '哲哲今天必须用珊珊指定的超肉麻爱称称呼她，叫错一次罚写情书！', hue: 290, type: 'wish' }
        ];

        let currentDeck = 'privilege';
        let currentPrize = null;
        let isScratched = false;
        let scratchPercent = 0;
        let inventory = {};
        let isCardUnlocked = false;
        let pendingPrizeId = "";
        let pendingDeck = "";

        // 🔊 Web Audio API 音效合成引擎
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
        }

        // 刮擦音效（使用白噪音和带通滤波器动态控制增益）
        function playScratchSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                
                // 产生一小段白噪音缓冲
                const bufferSize = audioCtx.sampleRate * 0.05; // 0.05秒
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                // 带通滤波器
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800;
                filter.Q.value = 1.5;

                // 增益节点
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                noise.start(now);
            } catch(e) {}
        }

        function playChimeSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                playTone(523.25, now, 0.15); // C5
                playTone(659.25, now + 0.08, 0.2); // E5
                playTone(783.99, now + 0.16, 0.3); // G5
            } catch(e) {}
        }

        function playTone(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.08, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.start(start);
            osc.stop(start + duration);
        }

        // Canvas 刮刮涂层绘制与刮除逻辑
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let totalPixels = 0;

        function initScratchCard(isUnlocked = false) {
            // 获取容器实际大小
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            isScratched = false;
            scratchPercent = 0;
            canvas.style.opacity = '1';
            canvas.style.pointerEvents = 'auto';

            if (!isUnlocked) {
                isCardUnlocked = false;
                
                // 绘制锁定的图层背景 (深蓝色底加半透明网格斜纹)
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 2;
                for (let i = -canvas.height; i < canvas.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i + canvas.height, canvas.height);
                    ctx.stroke();
                }

                // 绘制锁与提示文字
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 36px "Outfit"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const todayStr = new Date().toDateString();
                const lastFreeDate = safeGet('scratch_last_free_date');
                const hasFreeScratch = lastFreeDate !== todayStr;
                
                if (hasFreeScratch) {
                    ctx.fillText('🔒', canvas.width / 2, canvas.height / 2 - 30);
                    ctx.font = 'bold 16px "Outfit", "PingFang SC"';
                    ctx.fillText('今日刮刮卡尚未解锁', canvas.width / 2, canvas.height / 2 + 20);
                    ctx.font = '13px "Outfit", "PingFang SC"';
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText('点击下方按钮解锁今日惊喜', canvas.width / 2, canvas.height / 2 + 50);
                } else {
                    ctx.fillText('🎉', canvas.width / 2, canvas.height / 2 - 30);
                    ctx.font = 'bold 16px "Outfit", "PingFang SC"';
                    ctx.fillText('今日刮刮乐已完成', canvas.width / 2, canvas.height / 2 + 20);
                    ctx.font = '13px "Outfit", "PingFang SC"';
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText('特权已存入下方钱包，明天再来吧~', canvas.width / 2, canvas.height / 2 + 50);
                }
                
                // 锁定状态下的占位信息
                document.getElementById('prize-emoji').textContent = '❓';
                document.getElementById('prize-title').textContent = '神秘卡片';
                document.getElementById('prize-desc').textContent = '解锁今日刮刮乐后在此显示刮奖结果。';
                
                const cardBg = document.getElementById('card-content-layer');
                cardBg.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)';
                const frame = document.getElementById('card-inner-frame');
                frame.style.borderColor = 'rgba(0,0,0,0.1)';
            } else {
                isCardUnlocked = true;
                
                // 绘制银色/粉色渐变图层
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#ffa4b6');
                grad.addColorStop(0.5, '#ff7597');
                grad.addColorStop(1, '#a17fe0');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制金色杂质闪烁颗粒
                ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
                for (let i = 0; i < 200; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 绘制精美文字
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Outfit", "PingFang SC"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✨ 划开抽取恋爱惊喜 ✨', canvas.width / 2, canvas.height / 2);

                ctx.font = 'bold 12px "Outfit", "PingFang SC"';
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.fillText('❤️ SCRATCH ME HERE ❤️', canvas.width / 2, canvas.height / 2 + 35);

                totalPixels = canvas.width * canvas.height;
                
                // 选择刮出来的结果
                selectRandomPrize();
            }
        }

        // 选择随机卡片 (如果存在进行中的 pendingPrizeId，则直接锁定加载它)
        function selectRandomPrize() {
            if (pendingPrizeId) {
                const found = ALL_PRIZES.find(p => p.id === pendingPrizeId);
                if (found) {
                    currentPrize = found;
                }
            }
            
            if (!currentPrize) {
                const filtered = ALL_PRIZES.filter(p => p.type === currentDeck);
                currentPrize = filtered[Math.floor(Math.random() * filtered.length)];
            }
            
            // 渲染底层内容
            document.getElementById('prize-emoji').textContent = currentPrize.emoji;
            document.getElementById('prize-title').textContent = currentPrize.name;
            document.getElementById('prize-desc').textContent = currentPrize.desc;

            // 给卡底框加渐变色
            const cardBg = document.getElementById('card-content-layer');
            cardBg.style.background = `linear-gradient(135deg, hsl(${currentPrize.hue}, 100%, 98%) 0%, hsl(${currentPrize.hue}, 90%, 93%) 100%)`;
            
            const frame = document.getElementById('card-inner-frame');
            frame.style.borderColor = `hsl(${currentPrize.hue}, 80%, 75%)`;
        }

        // 切换卡包
        function switchDeck(deckName, btn) {
            if (isDrawing) return;
            if (isCardUnlocked) {
                alert('⚠️ 当前卡片已解锁，请先刮开它再切换卡包哦！');
                return;
            }
            currentDeck = deckName;
            
            // 按钮高亮切换
            const btns = document.querySelectorAll('.deck-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            initScratchCard(isCardUnlocked);
            playTone(400, audioCtx ? audioCtx.currentTime : 0, 0.05);
        }

        // 刮除行为核心计算
        function getBrushPos(x, y) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: x - rect.left,
                y: y - rect.top
            };
        }

        function scratch(x, y) {
            if (!isCardUnlocked) return; // 未解锁禁止划除
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 22, 0, Math.PI * 2);
            ctx.fill();

            // 触发音效
            playScratchSound();

            // 节流检测透光率
            checkScratchPercent();
        }

        function checkScratchPercent() {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let cleared = 0;
            const step = 4 * 16; // 降采样检测，极大提升性能
            for (let i = 3; i < imgData.data.length; i += step) {
                if (imgData.data[i] === 0) {
                    cleared += 16;
                }
            }
            scratchPercent = (cleared / totalPixels) * 100;

            if (scratchPercent > 15 && !isScratched) {
                isScratched = true;
                revealPrize();
            }
        }

        // 刮开完成的动效与奖励入库
        function revealPrize() {
            isCardUnlocked = false; // 刮开后防重复刷涂
            canvas.style.opacity = '0';
            canvas.style.pointerEvents = 'none';
            playChimeSound();
            
            pendingPrizeId = "";
            pendingDeck = "";

            // 添加至钱包
            if (currentPrize) {
                inventory[currentPrize.id] = (inventory[currentPrize.id] || 0) + 1;
                
                safeSet('gashapon_inventory', JSON.stringify(inventory));
                // 一并保存背包并清理进行中刮卡
                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        gashapon_inventory: JSON.stringify(inventory),
                        scratch_pending_prize_id: "",
                        scratch_pending_deck: ""
                    })
                }).catch(e => console.error("Cloud inventory and pending clean sync failed:", e));

                renderWallet();
                
                // 3D 庆祝翻转
                const box = document.getElementById('scratch-card-container');
                box.style.transform = 'scale(1.08) rotateY(360deg)';
                setTimeout(() => {
                    box.style.transform = 'none';
                }, 800);
            }
            
            currentPrize = null;
            initScratchCard(false); // 重画为锁定界面
            updateCountsDisplay();
        }

        // 刮新卡片逻辑 (扣次数)
        function buyNewCard() {
            initAudio();
            const todayStr = new Date().toDateString();
            const lastFreeDate = safeGet('scratch_last_free_date');
            const hasFreeScratch = lastFreeDate !== todayStr;

            const isInfinite = safeGet('scratch_infinite_spins') === 'true';
            const extraSpins = parseInt(safeGet('scratch_extra_spins', '0')) || 0;

            if (hasFreeScratch) {
                // 预先选定卡券并保存至云 pending，防止刷新重来
                const filtered = ALL_PRIZES.filter(p => p.type === currentDeck);
                const selected = filtered[Math.floor(Math.random() * filtered.length)];
                pendingPrizeId = selected.id;
                pendingDeck = currentDeck;

                safeSet('scratch_last_free_date', todayStr);
                
                // 向云端同步免费扣除状态与 pending 进行中的刮刮乐
                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        scratch_last_free_date: todayStr,
                        scratch_pending_prize_id: pendingPrizeId,
                        scratch_pending_deck: pendingDeck
                    })
                }).catch(e => console.error("Scratch date and pending sync failed:", e));

                initScratchCard(true); // 传入 true 以解锁
                updateCountsDisplay();
            } else if (isInfinite) {
                // 无限模式，预先选定卡券并保存至云 pending
                const filtered = ALL_PRIZES.filter(p => p.type === currentDeck);
                const selected = filtered[Math.floor(Math.random() * filtered.length)];
                pendingPrizeId = selected.id;
                pendingDeck = currentDeck;

                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        scratch_pending_prize_id: pendingPrizeId,
                        scratch_pending_deck: pendingDeck
                    })
                }).catch(e => console.error("Scratch pending sync failed:", e));

                initScratchCard(true);
                updateCountsDisplay();
            } else if (extraSpins > 0) {
                // 消耗一次额外机会，预先选定卡券并保存至云 pending
                const filtered = ALL_PRIZES.filter(p => p.type === currentDeck);
                const selected = filtered[Math.floor(Math.random() * filtered.length)];
                pendingPrizeId = selected.id;
                pendingDeck = currentDeck;

                const newExtra = extraSpins - 1;
                safeSet('scratch_extra_spins', String(newExtra));

                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        scratch_extra_spins: String(newExtra),
                        scratch_pending_prize_id: pendingPrizeId,
                        scratch_pending_deck: pendingDeck
                    })
                }).catch(e => console.error("Scratch extra spins sync failed:", e));

                initScratchCard(true);
                updateCountsDisplay();
            } else {
                alert('🙋 今日的免费和额外刮刮乐机会都已用完啦！请通过特权暗号获取更多机会，或者等明天再来噢~');
            }
        }

        function updateCountsDisplay() {
            const todayStr = new Date().toDateString();
            const lastFreeDate = safeGet('scratch_last_free_date');
            const hasFreeScratch = lastFreeDate !== todayStr;
            document.getElementById('free-scratches-count').textContent = hasFreeScratch ? '1' : '0';

            const isInfinite = safeGet('scratch_infinite_spins') === 'true';
            const extraSpins = parseInt(safeGet('scratch_extra_spins', '0')) || 0;
            
            const extraCountEl = document.getElementById('extra-scratches-count');
            if (extraCountEl) {
                extraCountEl.textContent = isInfinite ? '无限' : extraSpins;
            }

            const btn = document.getElementById('btn-action');
            if (isCardUnlocked) {
                btn.setAttribute('disabled', 'true');
                btn.textContent = '请在上方卡片区域刮奖';
            } else {
                if (hasFreeScratch) {
                    btn.removeAttribute('disabled');
                    btn.textContent = '🎁 解锁今日免费刮刮乐';
                } else if (isInfinite || extraSpins > 0) {
                    btn.removeAttribute('disabled');
                    btn.textContent = isInfinite ? '🎁 解锁 1 张刮刮卡 (无限机会)' : `🎁 解锁 1 张刮刮卡 (消耗 1 次/余 ${extraSpins} 次)`;
                } else {
                    btn.setAttribute('disabled', 'true');
                    btn.textContent = '今日次数已耗尽，明天再来';
                }
            }
        }

        // 兑换刮刮乐密钥特权口令
        window.redeemScratchKey = function() {
            const valInput = prompt('请输入哲哲给你的刮刮乐特权密令:');
            if (valInput === null) return;
            const key = valInput.trim();
            if (!key) return;

            const VALID_SCRATCH_KEYS = [
                'SCRATCH-LOVE-1004', 'SCRATCH-999-ZUZHE', 'SWEET-SCRATCH-520',
                'LUCKY-SCRATCH-777', 'SCRATCH-CHAMPION-888', 'SHANSHAN-BABY-999', 'LOVE-FOREVER-99'
            ];

            // 检查万能
            if (key === 'SCRATCH-ZUZHE-SHAN-999') {
                fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scratch_infinite_spins: 'true' })
                })
                .then(res => res.json())
                .then(cfg => {
                    safeSet('scratch_infinite_spins', 'true');
                    alert('👑 恭喜你！解锁了宇宙无限刮刮乐特权 (∞)！你可以无限次解锁并刮奖啦！');
                    location.reload();
                });
                return;
            }

            if (!VALID_SCRATCH_KEYS.includes(key)) {
                alert('❌ 密令不正确哦，快去微信找哲哲要最新的密令吧！');
                return;
            }

            fetch('/api/config')
                .then(res => res.json())
                .then(cfg => {
                    let used = [];
                    try { used = JSON.parse(cfg.scratch_used_keys || '[]'); } catch(e) {}
                    if (used.includes(key)) {
                        alert('⚠️ 这个密令你已经兑换过啦，不能重复兑换哦！');
                        return;
                    }
                    used.push(key);

                    const currentExtra = parseInt(cfg.scratch_extra_spins || '0');
                    const newExtra = currentExtra + 3; // 每个密钥兑换3次机会

                    fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            scratch_used_keys: JSON.stringify(used),
                            scratch_extra_spins: String(newExtra)
                        })
                    })
                    .then(res => res.json())
                    .then(updated => {
                        safeSet('scratch_used_keys', JSON.stringify(used));
                        safeSet('scratch_extra_spins', String(newExtra));
                        alert('🎉 兑换成功！已为你额外增加了 3 次刮刮乐刮奖机会！');
                        location.reload();
                    });
                })
                .catch(err => alert('📡 连不上云端数据库啦，请稍后再试！'));
        };

        // 钱包卡片入库与云同步
        function saveInventory() {
            safeSet('gashapon_inventory', JSON.stringify(inventory));
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gashapon_inventory: JSON.stringify(inventory) })
            }).catch(e => console.error("Cloud inventory sync failed:", e));
        }

        // 渲染钱包
        function renderWallet() {
            const container = document.getElementById('wallet-cards-container');
            if (!container) return;
            container.innerHTML = '';
            
            ALL_PRIZES.forEach(prize => {
                const count = inventory[prize.id] || 0;
                const card = document.createElement('div');
                card.className = `wallet-card ${count === 0 ? 'empty' : ''}`;
                card.style.background = count > 0 
                    ? `linear-gradient(135deg, hsl(${prize.hue}, 90%, 94%) 0%, hsl(${prize.hue}, 80%, 86%) 100%)`
                    : `rgba(255,255,255, 0.12)`;
                
                if (currentTheme === 'dark' && count > 0) {
                    card.style.background = `linear-gradient(135deg, hsl(${prize.hue}, 50%, 25%) 0%, hsl(${prize.hue}, 40%, 15%) 100%)`;
                }

                card.innerHTML = `
                    ${count > 0 ? `<span class="card-badge-count">x${count}</span>` : ''}
                    <div class="card-emoji">${prize.emoji}</div>
                    <div class="card-name">${prize.name}</div>
                    <div class="card-status">${count > 0 ? '👉 点击出示核销' : '🔒 尚未收集到'}</div>
                `;
                
                if (count > 0) {
                    card.addEventListener('click', () => showActiveUseCard(prize));
                }
                
                container.appendChild(card);
            });
        }

        // 弹窗展示与卡片兑换核销
        const overlay = document.getElementById('modal-overlay');
        const mCard = document.getElementById('modal-card-element');
        const btnUse = document.getElementById('btn-use-prize');

        function showActiveUseCard(prize) {
            initAudio();
            document.getElementById('modal-emoji-val').textContent = prize.emoji;
            document.getElementById('modal-name-val').textContent = prize.name;
            document.getElementById('modal-desc-val').textContent = prize.desc;

            mCard.style.background = `linear-gradient(135deg, hsl(${prize.hue}, 100%, 98%) 0%, hsl(${prize.hue}, 90%, 92%) 100%)`;
            mCard.style.borderColor = `hsl(${prize.hue}, 80%, 65%)`;

            overlay.style.display = 'flex';

            btnUse.onclick = () => {
                if (confirm(`确定要核销一张【${prize.name}】特权卡吗？数量会相应减少。`)) {
                    if (inventory[prize.id] && inventory[prize.id] > 0) {
                        inventory[prize.id]--;
                        saveInventory();
                        renderWallet();
                        closeModal();
                        
                        // 播放核销声音
                        try {
                            const now = audioCtx.currentTime;
                            const osc = audioCtx.createOscillator();
                            const gain = audioCtx.createGain();
                            osc.connect(gain);
                            gain.connect(audioCtx.destination);
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(150, now);
                            osc.frequency.exponentialRampToValueAtTime(700, now + 0.12);
                            gain.gain.setValueAtTime(0.3, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                            osc.start(now);
                            osc.stop(now + 0.12);
                        } catch(e) {}
                    }
                }
            };
        }

        function closeModal() {
            overlay.style.display = 'none';
        }

        // 绑定 Canvas 事件
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const pos = getBrushPos(e.clientX, e.clientY);
            scratch(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getBrushPos(e.clientX, e.clientY);
            scratch(pos.x, pos.y);
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        // 移动端 Touch 支持
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const t = e.touches[0];
            const pos = getBrushPos(t.clientX, t.clientY);
            scratch(pos.x, pos.y);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const t = e.touches[0];
            const pos = getBrushPos(t.clientX, t.clientY);
            scratch(pos.x, pos.y);
        });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        // 🌗 主题控制
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = safeGet('theme', 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            safeSet('theme', currentTheme);
            updateThemeIcon();
            renderWallet();
        });

        function updateThemeIcon() {
            themeBtn.innerHTML = currentTheme === 'light' 
                ? '<i class="fas fa-moon"></i>' 
                : '<i class="fas fa-sun"></i>';
        }

        // 星辰闪烁 Canvas 背景
        function initBgCanvas() {
            const bgCanvas = document.getElementById('bg-canvas');
            const bgCtx = bgCanvas.getContext('2d');
            let w = bgCanvas.width = window.innerWidth;
            let h = bgCanvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                w = bgCanvas.width = window.innerWidth;
                h = bgCanvas.height = window.innerHeight;
            });

            const stars = [];
            for (let i = 0; i < 45; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }

            function drawBg() {
                bgCtx.clearRect(0, 0, w, h);
                bgCtx.fillStyle = currentTheme === 'light' ? '#333333' : '#ffffff';
                
                stars.forEach(s => {
                    s.alpha += s.speed;
                    if (s.alpha > 1 || s.alpha < 0) {
                        s.speed = -s.speed;
                    }
                    bgCtx.save();
                    bgCtx.globalAlpha = Math.max(0.1, s.alpha);
                    bgCtx.beginPath();
                    bgCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    bgCtx.fill();
                    bgCtx.restore();
                });
                requestAnimationFrame(drawBg);
            }
            drawBg();
        }

        // 初始化加载数据
        window.addEventListener('DOMContentLoaded', () => {
            // 背景与次数
            initBgCanvas();
            updateCountsDisplay();
            initScratchCard(false); // 默认初始锁定

            // 拉取云端背包和次数
            fetch('/api/config')
                .then(res => res.json())
                .then(cfg => {
                    // 同步今日刮卡扣除日期，并在本地渲染
                    safeSet('scratch_last_free_date', cfg.scratch_last_free_date !== undefined ? cfg.scratch_last_free_date : '');
                    safeSet('scratch_extra_spins', cfg.scratch_extra_spins !== undefined ? cfg.scratch_extra_spins : '0');
                    safeSet('scratch_infinite_spins', cfg.scratch_infinite_spins !== undefined ? cfg.scratch_infinite_spins : 'false');
                    safeSet('scratch_used_keys', cfg.scratch_used_keys !== undefined ? cfg.scratch_used_keys : '[]');
                    
                    // 获取云端锁定的未刮完卡片
                    pendingPrizeId = cfg.scratch_pending_prize_id || "";
                    pendingDeck = cfg.scratch_pending_deck || "";
                    
                    // 同步刮刮乐专属奖励池
                    if (cfg.scratch_prizes !== undefined) {
                        const prizesVal = typeof cfg.scratch_prizes === 'object' ? JSON.stringify(cfg.scratch_prizes) : String(cfg.scratch_prizes);
                        safeSet('scratch_prizes', prizesVal);
                        try {
                            const parsedPrizes = JSON.parse(prizesVal);
                            if (parsedPrizes && Array.isArray(parsedPrizes)) {
                                ALL_PRIZES = parsedPrizes.map(p => {
                                    if (!p.type) {
                                        // 动态分配卡包类别
                                        if (['sleep', 'breakfast', 'massage'].includes(p.id)) {
                                            p.type = 'privilege';
                                        } else if (['no_angry', 'yes_day', 'secret_gift', 'blackmail'].includes(p.id)) {
                                            p.type = 'penalty';
                                        } else if (['hug_tick', 'nickname'].includes(p.id)) {
                                            p.type = 'wish';
                                        } else {
                                            p.type = 'privilege';
                                        }
                                    }
                                    return p;
                                });
                            }
                        } catch(e) {}
                    } else {
                        // 云端没有，说明是第一次运行，直接初始化出厂设置
                        fetch('/api/config', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ scratch_prizes: JSON.stringify(ALL_PRIZES) })
                        }).catch(e => console.error("Initialize scratch_prizes failed:", e));
                    }

                    if (cfg.gashapon_inventory !== undefined) {
                        const val = typeof cfg.gashapon_inventory === 'object' ? JSON.stringify(cfg.gashapon_inventory) : String(cfg.gashapon_inventory);
                        safeSet('gashapon_inventory', val);
                        try { inventory = JSON.parse(val); } catch(e) {}
                    } else {
                        inventory = {};
                    }
                    
                    updateCountsDisplay();
                    
                    if (pendingPrizeId) {
                        // 恢复原有的卡包高亮
                        currentDeck = pendingDeck;
                        const btns = document.querySelectorAll('.deck-btn');
                        btns.forEach(b => {
                            const clickAttr = b.getAttribute('onclick') || '';
                            if (clickAttr.includes(currentDeck)) {
                                b.classList.add('active');
                            } else {
                                b.classList.remove('active');
                            }
                        });
                        initScratchCard(true); // 恢复未刮完的解锁状态现场
                    } else {
                        initScratchCard(false); // 默认初始锁定
                    }
                    
                    renderWallet();
                })
                .catch(err => {
                    console.warn("Could not fetch sync data from cloud server, loading local cache:", err);
                    try {
                        const stored = safeGet('gashapon_inventory');
                        inventory = stored ? JSON.parse(stored) : {};
                    } catch(e) {
                        inventory = {};
                    }
                    renderWallet();
                });
        });
    </script>
</body>
</html>
